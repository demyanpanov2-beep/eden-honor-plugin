window-hours: 96
white-damage-threshold: 5.0
yellow-damage-threshold: 450.0
black-kill-threshold: 3
black-victim-chain-hours: 24
last-aggressor-seconds: 20
autosave-seconds: 300

ignored-worlds:
  - duel_world
  - event_world

chat:
  enabled: true
  format: '<name> <indicator><gray>: </gray><message>'

indicators:
  white: '&f●'
  green: '&a●'
  yellow: '&e●'
  red: '&c●'
  black: '&0●'

status-text:
  white: '&fБелая'
  green: '&aЗелёная'
  yellow: '&eЖёлтая'
  red: '&cКрасная'
  black: '&0Чёрная'

messages:
  prefix: '&8[&dEdenHonor&8] &7'
  no-permission: '&cУ тебя нет прав.'
  player-only: '&cЭту команду может использовать только игрок.'
  unknown-player: '&cИгрок не найден.'
  reloaded: '&aКонфиг и данные перезагружены.'
  pardon-done: '&aСтатус игрока очищен.'
  wipe-one: '&aИстория игрока очищена.'
  wipe-all: '&aИстория всех игроков очищена.'
  trade-blocked: '&cЖители отказываются торговать с игроками с красной и чёрной меткой.'
  status-line-1: '&fСтатус: %status_text% %indicator%'
  status-line-2: '&fУрон за окно: &6%damage%'
  status-line-3: '&fАктивных убийств за окно: &c%kills%'
  status-line-peaceful: '&fДо жёлтой метки: &e%damage_to_yellow%'
  status-line-hostile-1: '&fДо зелёной/белой метки: &b%timeleft%'
  status-line-hostile-2: '&fДо белой метки: &f%white_time%'
  status-line-black: '&fС последнего убийства прошло: &8%black_last_kill_ago%'
  status-line-reason: '&fПоследняя причина убийства: &e%reason%'
